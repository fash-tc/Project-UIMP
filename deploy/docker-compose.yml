name: uip

services:
  # ============================================
  # PostgreSQL - Shared database
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: uip-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: keep
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: "1.0"
    networks:
      - uip-net

  # ============================================
  # Keep API - Alert Aggregation Backend
  # ============================================
  keep-api:
    image: us-central1-docker.pkg.dev/keephq/keep/keep-api:latest
    container_name: uip-keep-api
    restart: unless-stopped
    tmpfs:
      - /tmp:size=256M
    environment:
      DATABASE_CONNECTION_STRING: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/keep
      SECRET_MANAGER_TYPE: FILE
      SECRET_MANAGER_DIRECTORY: /app/secrets
      AUTH_TYPE: NO_AUTH
      KEEP_API_URL: http://keep-api:8080
      KEEP_FRONTEND_URL: http://10.177.154.196
      PUSHER_DISABLED: "true"
    volumes:
      - keep_secrets:/app/secrets
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/')"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 2048M
          cpus: "2.0"
    networks:
      - uip-net

  # ============================================
  # Keep Frontend - Admin UI (not for SREs)
  # ============================================
  keep-frontend:
    image: us-central1-docker.pkg.dev/keephq/keep/keep-ui:latest
    container_name: uip-keep-ui
    restart: unless-stopped
    tmpfs:
      - /tmp:size=128M
    environment:
      API_URL: http://keep-api:8080
      AUTH_TYPE: NO_AUTH
      NEXTAUTH_URL: http://10.177.154.196
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXT_PUBLIC_API_URL: http://10.177.154.196/backend
      PUSHER_DISABLED: "true"
    depends_on:
      keep-api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    networks:
      - uip-net


  # ============================================
  # Alert Enricher - Enhanced AI Analysis
  # ============================================
  alert-enricher:
    image: python:3.12-slim
    container_name: uip-alert-enricher
    restart: unless-stopped
    command: python3 -u /app/enricher.py
    volumes:
      - ./enricher/enricher.py:/app/enricher.py:ro
    environment:
      OLLAMA_URL: ${OLLAMA_URL:-http://aicompute01.cnco1.tucows.cloud:31434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:3b}
      KEEP_URL: http://keep-api:8080
      KEEP_API_KEY: ${KEEP_API_KEY}
      POLL_INTERVAL: "60"
      RUNBOOK_API_URL: http://runbook-api:8090
      FLAP_WINDOW_SECONDS: "${FLAP_WINDOW_SECONDS:-600}"
      DEDUP_WINDOW_SECONDS: "${DEDUP_WINDOW_SECONDS:-1800}"
      NOISE_THRESHOLD: "${NOISE_THRESHOLD:-8}"
      ALERT_STATE_API_URL: "http://alert-state-api:8092"
    depends_on:
      keep-api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
    networks:
      - uip-net

  # ============================================
  # SRE Frontend - Custom Next.js Portal
  # ============================================
  sre-frontend:
    build:
      context: ./sre-frontend
      dockerfile: Dockerfile
      args:
        AUTH_SECRET: "${AUTH_SECRET}"
    container_name: uip-sre-frontend
    restart: unless-stopped
    tmpfs:
      - /tmp:size=128M
    environment:
      HOSTNAME: "0.0.0.0"
      NEXT_PUBLIC_BASE_PATH: /portal
      KEEP_API_URL: http://keep-api:8080
      AUTH_SECRET: "${AUTH_SECRET}"
    depends_on:
      keep-api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    networks:
      - uip-net

  # ============================================
  # n8n - Workflow Automation
  # ============================================
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: uip-n8n
    restart: unless-stopped
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_HOST: 10.177.154.196
      N8N_PATH: /n8n/
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://10.177.154.196/n8n/
      GENERIC_TIMEZONE: America/Toronto
      N8N_SECURE_COOKIE: "false"
      N8N_PROXY_HOPS: "1"
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: "1.5"
    networks:
      - uip-net

  # ============================================
  # Health Checker - Service Monitor
  # ============================================
  health-checker:
    image: python:3.12-slim
    container_name: uip-health-checker
    restart: unless-stopped
    command: python3 -u /app/health-checker.py
    volumes:
      - ./health-checker/health-checker.py:/app/health-checker.py:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      KEEP_URL: http://keep-api:8080
      KEEP_API_KEY: ${KEEP_API_KEY}
      API_PORT: "8089"
    depends_on:
      keep-api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.1"
    networks:
      - uip-net

  # ============================================
  # Runbook API - Remediation Knowledge Base
  # ============================================
  runbook-api:
    image: python:3.12-slim
    container_name: uip-runbook-api
    restart: unless-stopped
    command: python3 -u /app/runbook-api.py
    volumes:
      - ./runbook-api/runbook-api.py:/app/runbook-api.py:ro
      - ./runbook-api/backfill_rag.py:/app/backfill_rag.py:ro
      - runbook_data:/data
    environment:
      API_PORT: "8090"
      DB_PATH: "/data/runbook.db"
      AUTH_SECRET: "${AUTH_SECRET}"
      JIRA_BASE_URL: "https://wiki-tucows.atlassian.net"
      JIRA_EMAIL: "${JIRA_EMAIL}"
      JIRA_API_TOKEN: "${JIRA_API_TOKEN}"
      OCCIR_INCIDENT_ISSUETYPE_ID: "${OCCIR_INCIDENT_ISSUETYPE_ID:-10333}"
      OCCIR_TICKET_ISSUETYPE_ID: "${OCCIR_TICKET_ISSUETYPE_ID}"
      RAG_SEARCH_URL: "${RAG_SEARCH_URL:-http://aicompute01.cnco1.tucows.cloud:31445}"
      RAG_COLLECTION: "${RAG_COLLECTION:-sre_runbooks}"
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
    networks:
      - uip-net

  # ============================================
  # Auth API - Authentication Service
  # ============================================
  auth-api:
    image: python:3.12-slim
    container_name: uip-auth-api
    restart: unless-stopped
    command: python3 -u /app/auth-api.py
    volumes:
      - ./auth-api/auth-api.py:/app/auth-api.py:ro
      - auth_data:/data
    environment:
      API_PORT: "8093"
      DB_PATH: /data/auth.db
      AUTH_SECRET: "${AUTH_SECRET}"
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
    networks:
      - uip-net

  # ============================================
  # Admin API — Runtime Config + Control Plane
  # ============================================
  admin-api:
    image: python:3.12-slim
    container_name: uip-admin-api
    restart: unless-stopped
    command: sh -c "pip install -q -r /app/requirements.txt && python3 -u /app/admin-api.py"
    volumes:
      - ./admin-api:/app:ro
      - ./uip_config_client:/uip_config_client:ro
      - admin_data:/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      API_PORT: "8096"
      DB_PATH: /data/admin.db
      AUTH_API_URL: http://auth-api:8093
      AUTH_SECRET: "${AUTH_SECRET}"
      CLUSTER_ENDPOINT: "${OLLAMA_URL}"
      ADMIN_BYPASS_TOKEN: "${ADMIN_BYPASS_TOKEN:-}"
      PYTHONPATH: "/:/app"
    depends_on:
      auth-api:
        condition: service_started
    deploy:
      resources:
        limits: { memory: 256M, cpus: "0.5" }
    networks:
      - uip-net

  # ============================================
  # Alert State API - Investigation Tracking
  # ============================================
  alert-state-api:
    image: python:3.12-slim
    container_name: uip-alert-state-api
    restart: unless-stopped
    command: python3 -u /app/alert-state-api.py
    volumes:
      - ./alert-state-api/alert-state-api.py:/app/alert-state-api.py:ro
      - alert_state_data:/data
    environment:
      API_PORT: "8092"
      DB_PATH: /data/alert-states.db
      AUTH_SECRET: "${AUTH_SECRET}"
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
    networks:
      - uip-net

  # ============================================
  # Loki Gateway - Log Query Service
  # ============================================
  loki-gateway:
    image: python:3.12-slim
    container_name: uip-loki-gateway
    restart: unless-stopped
    command: python3 -u /app/loki-gateway.py
    volumes:
      - ./loki-gateway/loki-gateway.py:/app/loki-gateway.py:ro
    environment:
      API_PORT: "8091"
      AUTH_SECRET: "${AUTH_SECRET}"
      GRAFANA_URL: "https://grafana.prod-domains-shared.bra2.tucows.systems"
      GRAFANA_USER: "${GRAFANA_USER}"
      GRAFANA_PASS: "${GRAFANA_PASS}"
      LOKI_DATASOURCE_ID: "17"
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
    networks:
      - uip-net

  # ============================================
  # OpenSRS Health API - Log-derived health reports
  # ============================================
  opensrs-health-api:
    image: python:3.12-slim
    container_name: uip-opensrs-health-api
    restart: unless-stopped
    command: python3 -u /app/opensrs-health-api.py
    volumes:
      - ./opensrs-health-api/opensrs-health-api.py:/app/opensrs-health-api.py:ro
      - opensrs_health_data:/data
    environment:
      API_PORT: "8095"
      DB_PATH: /data/opensrs-health.db
      AUTH_SECRET: "${AUTH_SECRET}"
      GRAFANA_URL: "https://grafana.prod-domains-shared.bra2.tucows.systems"
      GRAFANA_USER: "${GRAFANA_USER}"
      GRAFANA_PASS: "${GRAFANA_PASS}"
      LOKI_DATASOURCE_ID: "17"
      AI_API_BASE: "${OPENAI_API_BASE:-http://aicompute01.cnco1.tucows.cloud:31434/v1}"
      AI_MODEL: "${OPENAI_MODEL:-qwen-assistant:latest}"
      AI_API_KEY: "${OPENAI_API_KEY:-}"
      AI_MAX_TOKENS: "4096"
      MAX_ENTRIES_PER_QUERY: "500"
      MAX_SAMPLES_PER_LANE: "20"
      COOLDOWN_SECONDS: "60"
      REPORT_RETENTION: "100"
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
    networks:
      - uip-net

  # ============================================
  # Escalation API — Grafana IRM Integration
  # ============================================
  escalation-api:
    image: python:3.12-slim
    container_name: uip-escalation-api
    restart: unless-stopped
    command: python3 -u /app/escalation-api.py
    volumes:
      - ./escalation-api/escalation-api.py:/app/escalation-api.py:ro
    environment:
      API_PORT: "8094"
      AUTH_SECRET: "${AUTH_SECRET}"
      GRAFANA_ONCALL_URL: "${GRAFANA_ONCALL_URL}"
      GRAFANA_ONCALL_API_KEY: "${GRAFANA_ONCALL_API_KEY}"
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
    networks:
      - uip-net

  # ============================================
  # Nginx - Reverse Proxy
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: uip-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx-default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - keep-api
      - keep-frontend
      - sre-frontend
      - n8n
      - health-checker
      - runbook-api
      - auth-api
      - admin-api
      - alert-state-api
      - loki-gateway
      - opensrs-health-api
      - escalation-api
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
    networks:
      - uip-net

volumes:
  postgres_data:
  keep_secrets:
  n8n_data:
  runbook_data:
  auth_data:
  alert_state_data:
  opensrs_health_data:
  admin_data:

networks:
  uip-net:
    driver: bridge
