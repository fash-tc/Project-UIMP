map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80 default_server;
    server_name _;
    charset utf-8;
    client_max_body_size 50M;

    # -- Landing page --
    location = / {
        default_type 'text/html; charset=utf-8';
        add_header Cache-Control 'no-cache, no-store, must-revalidate';
        add_header Pragma 'no-cache';
        return 200 '<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>UIP - Unified Incident Platform</title>
<style>
body{font-family:system-ui,sans-serif;background:#0a0a0f;color:#e4e4ed;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0}
.c{text-align:center;max-width:600px}
h1{font-size:2em;margin-bottom:.5em;background:linear-gradient(135deg,#fff,#a29bfe);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
p.s{color:#8888a4;margin-bottom:2em}
.sv{display:grid;gap:12px}
a{display:block;padding:16px 24px;background:#12121a;border:1px solid #2a2a40;border-radius:10px;color:#a29bfe;text-decoration:none;font-weight:600;transition:border-color .2s}
a:hover{border-color:#6c5ce7}
a.primary{border-color:#6c5ce7;background:#1a1a2e}
small{color:#5a5a78;display:block;margin-top:4px;font-weight:400}
</style></head><body>
<div class="c">
<h1>Unified Incident Platform</h1>
<p class="s">Tucows Domains -- SRE Operations</p>
<div class="sv">
<a href="/portal/" class="primary">SRE Command Center<small>AI-enriched alerts, incident overview, impact analysis</small></a>
<a href="/incidents">Keep Admin<small>Alert management, providers, integrations</small></a>
<a href="/n8n/">n8n -- Workflow Automation<small>Severity routing, Slack workflows</small></a>
<a href="/portal/maintenance">Maintenance Tracker<small>Scheduled maintenance windows, change management</small></a>
</div>
</div></body></html>';
    }

    # -- SRE Portal (primary interface) --
    location = /portal {
        return 301 /portal/;
    }
    location /portal/ {
        proxy_pass http://sre-frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # -- SRE Frontend API proxy to Keep (injects API key) --
    location /api/keep/ {
        proxy_pass http://keep-api:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-API-KEY "ca5ee58d-1a50-4817-aac5-9a538e40590d";
    }

    # -- Health Checker API proxy --
    location /api/health/ {
        proxy_pass http://health-checker:8089/api/health/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Auth API — user management and authentication
    location /api/auth/ {
        proxy_pass http://auth-api:8093;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Alert State API — investigation and acknowledgment tracking
    # Note: use prefix match without trailing slash to catch both
    # /api/alert-states and /api/alert-states/investigate etc.
    location /api/alert-states {
        proxy_pass http://alert-state-api:8092;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Escalation API — Grafana IRM integration
    location /api/escalation/ {
        proxy_pass http://escalation-api:8094/api/escalation/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Loki Gateway — log queries, registry health, trends
    location /api/loki/ {
        proxy_pass http://loki-gateway:8091;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    # -- Runbook API proxy --
    location /api/runbook/ {
        proxy_pass http://runbook-api:8090/api/runbook/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # -- Maintenance Tracker API proxy --
    location /api/maintenance/ {
        proxy_pass http://10.177.154.174/api/;
        proxy_set_header Host 10.177.154.174;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # -- Keep alerts API (for Keep UI — needs API key) --
    location /alerts/ {
        proxy_pass http://keep-api:8080/alerts/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-API-KEY "ca5ee58d-1a50-4817-aac5-9a538e40590d";
    }

    # -- Keep preset/topology/workflows (for Keep UI — needs API key) --
    location /preset/ {
        proxy_pass http://keep-api:8080/preset/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-API-KEY "ca5ee58d-1a50-4817-aac5-9a538e40590d";
    }

    location /topology/ {
        proxy_pass http://keep-api:8080/topology/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-API-KEY "ca5ee58d-1a50-4817-aac5-9a538e40590d";
    }

    location /workflows/ {
        proxy_pass http://keep-api:8080/workflows/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-API-KEY "ca5ee58d-1a50-4817-aac5-9a538e40590d";
    }

    location /providers/ {
        proxy_pass http://keep-api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # -- Keep backend API (for Keep UI) --
    location /backend/ {
        proxy_pass http://keep-api:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-API-KEY "ca5ee58d-1a50-4817-aac5-9a538e40590d";
    }

    # -- Keep static assets --
    location /_next/ {
        proxy_pass http://keep-frontend:3000;
        proxy_set_header Host $host;
    }

    # -- n8n --
    location = /n8n {
        return 302 /n8n/;
    }
    location /n8n/ {
        proxy_pass http://n8n:5678/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Accept-Encoding "";
        sub_filter_once off;
        sub_filter_types text/css application/javascript;
        sub_filter '"/assets/' '"/n8n/assets/';
        sub_filter 'url(/assets/' 'url(/n8n/assets/';
    }

    # -- Keep frontend catch-all (admin UI) --
    location / {
        proxy_pass http://keep-frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
