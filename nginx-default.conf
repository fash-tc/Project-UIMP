# =============================================
# UIP - Bare IP Routing (Port 80)
# Keep = catch-all at root, others on subpaths
# Host-based routing preserved for users with hosts file
# =============================================

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80 default_server;
    server_name _;
    charset utf-8;
    client_max_body_size 50M;

    # -- Landing page (exact root only) --
    location = / {
        default_type 'text/html; charset=utf-8';
        return 200 '<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>UIP - Unified Incident Platform</title>
<style>
body{font-family:system-ui,sans-serif;background:#0a0a0f;color:#e4e4ed;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0}
.c{text-align:center;max-width:600px}
h1{font-size:2em;margin-bottom:.5em;background:linear-gradient(135deg,#fff,#a29bfe);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
p.s{color:#8888a4;margin-bottom:2em}
.sv{display:grid;gap:12px}
a{display:block;padding:16px 24px;background:#12121a;border:1px solid #2a2a40;border-radius:10px;color:#a29bfe;text-decoration:none;font-weight:600;transition:border-color .2s}
a:hover{border-color:#6c5ce7}
small{color:#5a5a78;display:block;margin-top:4px;font-weight:400}
</style></head><body>
<div class="c">
<h1>Unified Incident Platform</h1>
<p class="s">Tucows Domains -- SRE Operations</p>
<div class="sv">
<a href="/incidents">Keep -- Alert Unification<small>All alerts in one place</small></a>
<a href="/goalert/">GoAlert -- On-Call and Paging<small>Schedules, escalations, SMS/voice</small></a>
<a href="/n8n/">n8n -- Workflow Automation<small>Severity routing, Slack workflows</small></a>
<a href="/kuma/">Uptime Kuma -- Status Page<small>External endpoint monitoring</small></a>
</div>
</div></body></html>';
    }

    # -- Keep API webhooks (bare IP access for Zabbix etc.) --
    location /alerts/event/ {
        proxy_pass http://keep-api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /providers/ {
        proxy_pass http://keep-api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # -- Keep backend API proxy --
    location /backend/ {
        proxy_pass http://keep-api:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # -- Keep Next.js static assets --
    location /_next/ {
        proxy_pass http://keep-frontend:3000;
        proxy_set_header Host $host;
    }

    # -- GoAlert (subpath, native prefix via --public-url) --
    location = /goalert {
        return 302 /goalert/;
    }
    location /goalert/ {
        proxy_pass http://goalert:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # -- n8n (subpath, N8N_PATH generates /n8n/ prefixed URLs, nginx strips prefix) --
    location = /n8n {
        return 302 /n8n/;
    }
    location /n8n/ {
        proxy_pass http://n8n:5678/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_buffering off;
        proxy_cache off;
        # Rewrite absolute asset paths in CSS (fonts, images)
        proxy_set_header Accept-Encoding "";
        sub_filter_once off;
        sub_filter_types text/css application/javascript;
        sub_filter '"/assets/' '"/n8n/assets/';
        sub_filter 'url(/assets/' 'url(/n8n/assets/';
    }

    # -- Uptime Kuma (subpath) --
    location = /kuma {
        return 302 /kuma/;
    }
    location /kuma/ {
        proxy_pass http://uptime-kuma:3001/;
        proxy_redirect / /kuma/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Accept-Encoding "";
        sub_filter_once off;
        sub_filter_types text/html application/javascript;
        sub_filter '"/assets/' '"/kuma/assets/';
        sub_filter '"/socket.io' '"/kuma/socket.io';
        sub_filter '"/api/' '"/kuma/api/';
        sub_filter '"/icon' '"/kuma/icon';
        sub_filter '"/upload/' '"/kuma/upload/';
    }
    location /kuma/assets/ {
        proxy_pass http://uptime-kuma:3001/assets/;
    }
    location /kuma/socket.io/ {
        proxy_pass http://uptime-kuma:3001/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
    location /kuma/api/ {
        proxy_pass http://uptime-kuma:3001/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /kuma/icon/ {
        proxy_pass http://uptime-kuma:3001/icon/;
    }
    location /kuma/upload/ {
        proxy_pass http://uptime-kuma:3001/upload/;
    }

    # -- Keep frontend catch-all (everything else) --
    location / {
        proxy_pass http://keep-frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}

# -- Host-based routing (for users with hosts file entries) --

server {
    listen 80;
    server_name keep.uip;
    client_max_body_size 50M;

    location / {
        proxy_pass http://keep-frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    location /backend/ {
        proxy_pass http://keep-api:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name goalert.uip;
    location / {
        proxy_pass http://goalert:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # GoAlert uses --public-url with /goalert prefix;
        # rewrite incoming root-based requests to include the prefix
        rewrite ^/(.*)$ /goalert/$1 break;
    }
}

server {
    listen 80;
    server_name n8n.uip;
    client_max_body_size 50M;
    # n8n uses N8N_PATH=/n8n/ but serves files at root; redirect to subpath URL
    return 301 http://10.177.154.196/n8n$request_uri;
}

server {
    listen 80;
    server_name kuma.uip;
    location / {
        proxy_pass http://uptime-kuma:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
